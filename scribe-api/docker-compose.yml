services:
  scribe-api:
    image: pieterkdevilliers/scribe-api:latest
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8012:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - scribe_temp:/tmp/scribe

  worker:
    image: pieterkdevilliers/scribe-api:latest
    build:
      context: .
    command: uv run arq worker.WorkerSettings
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - scribe_temp:/tmp/scribe

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Pull the model on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull llama3.1:8b &&
             wait"

volumes:
  scribe_temp:
  ollama_models:
